<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>Mortage Calculator</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer ></script>
    
</head>
<body>
  <main class="container">
    <!-- coté gauche form-->
     <section class="Calculator">
        <div class="calculator-header">
            <h1>Mortage Calculator</h1>
            <button type="button" class="clear-btn">Clear All</button>
        </div>

        <form id="mortage-form">
            <!--Mortage Amount-->
            <div class="form-group">
                <label for="amount">Mortage Amount</label>
                <div class="input-wrapper">
                    <span class="prefix">£</span>
                    <input type="number" id="amount" placeholder="300,000" required>
                </div>
                <small class="error-message"></small>
            </div>

             <!--Mortage term-->

            <div class="form-row">
                <div class="form-group">
                    <label for="term">Mortage Term</label>
                    <div class="input-wrapper">
                        <input type="number" id="term" placeholder="25" required>
                        <span class="suffix">Years</span>

                    </div>
                     <small class="error-message"></small>

                </div>
                
             <!--Interst Rate-->
             <div class="form-group">
                <label for="rate">Interest Rate </label>
                <div class="input-wrapper">
                    <input type="number" step="0.01" id="rate" placeholder="5.25">
                    <span class="suffix">%</span>
                </div>
                <small class="error-message"></small>
             </div>
             <!--Mortage Type-->
             <div class="form-group">
             <label>Mortage Type</label>
             <div class="radio-group">
                <label class="radio-option">
                    <input type="radio" name="type" value="repayment" required>
                    <span>Repayment</span>
                </label>

                <label class="radio-option">
                    <input type="radio" name="type" value="interest-only" required>
                    <span>Interest Only</span>
                </label>

             </div>
             <small class="error-message"></small>
             </div>

            <!-- button -->
             <button type="submit" class="calculate-btn">
              Calculate Repayments
             </button>

            </div>
        </form>
     </section>

      <!-- coté droit form-->

      <section class="results">
       <div class="results-empty" id="empty-state">
        <h2>Your results</h2>
        <p>
         Complete the form and click “calculate repayments” to see what 
          your monthly repayments would be.
        </p>

       </div>


       <div class="results-filled hidden" id="results">
        <h2>Your results</h2>
        <p>
                  Your results are shown below based on the information you provided.
        </p>

       </div>

       <div class="result-box">
        <p> Your monthly repayment </p>
        <h3 id="monthly">£0.00</h3>
       </div>
    

      </section>

  </main>
    
</body>
</html>
