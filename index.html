<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mortgage Calculator</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="script.js"></script>
</head>
<body>

  <main class="container">

    <!-- coté gauche formulaire -->
    <section class="calculator">

      <div class="calculator-header">
        <h1>Mortgage Calculator</h1>
        <button type="button" class="clear-btn">Clear All</button>
      </div>

      <form id="mortgage-form">

        <!-- Partie Mortgage Amount -->
        <div class="form-group">
          <label for="amount">Mortgage Amount</label>
          <div class="input-wrapper">
            <span class="prefix">£</span>
            <input type="number" id="amount" placeholder="300,000" required />
          </div>
          <small class="error-message"></small>
        </div>

        <!-- Partie Term et Interest -->
        <div class="form-row">

          <div class="form-group">
            <label for="term">Mortgage Term</label>
            <div class="input-wrapper">
              <input type="number" id="term" placeholder="25" required />
              <span class="suffix">years</span>
            </div>
            <small class="error-message"></small>
          </div>

          <div class="form-group">
            <label for="rate">Interest Rate</label>
            <div class="input-wrapper">
              <input type="number" step="0.01" id="rate" placeholder="5.25" required />
              <span class="suffix">%</span>
            </div>
            <small class="error-message"></small>
          </div>

        </div>

        <!-- Partie Mortgage Type -->
        <div class="form-group">
          <label>Mortgage Type</label>

          <div class="radio-group">
            <label class="radio-option">
              <input type="radio" name="type" value="repayment" required />
              <span>Repayment</span>
            </label>

            <label class="radio-option">
              <input type="radio" name="type" value="interest-only" />
              <span>Interest Only</span>
            </label>
          </div>

          <small class="error-message"></small>
        </div>

        <!-- le Button -->
        <button type="submit" class="calculate-btn">
          Calculate Repayments
        </button>

      </form>

    </section>

    <!-- Coté droit du résultat(RESULTS) -->
    <section class="results">

      
      <div class="results-empty" id="empty-state">
        <h2>Your results</h2>
        <p>
          Complete the form and click “calculate repayments” to see what 
          your monthly repayments would be.
        </p>
      </div>

      <div class="results-filled hidden" id="results">

        <h2>Your results</h2>
        <p class="description">
          Your results are shown below based on the information you provided.
        </p>

        <div class="result-box">
          <p>Your monthly repayments</p>
          <h3 id="monthly">£0.00</h3>
        </div>

        <div class="result-total">
          <p>Total you'll repay over the term</p>
          <h4 id="total">£0.00</h4>
        </div>

      </div>

    </section>

  </main>
</body>
</html>
